  </g>
  <!-- Wordmark -->
  <text x="256" y="393" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="52" fill="white" letter-spacing="2">YARD<tspan fill="#7ecf9e">SAILOR</tspan></text>
  <text x="256" y="424" text-anchor="middle" font-family="Arial,sans-serif" font-size="19" fill="#7ecf9e" letter-spacing="4" font-weight="600">AI-POWERED</text>
