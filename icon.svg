<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="c"><circle cx="256" cy="256" r="256"/></clipPath>
    <radialGradient id="mg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a3a2a" stop-opacity="0"/>
      <stop offset="65%" stop-color="#1a3a2a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a3a2a" stop-opacity="0.96"/>
