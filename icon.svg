    <line x1="0" y1="290" x2="512" y2="290" stroke="#1e4a2c" stroke-width="36"/>
    <line x1="0" y1="370" x2="512" y2="378" stroke="#1e4a2c" stroke-width="16"/>
    <line x1="0" y1="440" x2="512" y2="448" stroke="#1e4a2c" stroke-width="24"/>
    <line x1="90" y1="0" x2="82" y2="512" stroke="#1e4a2c" stroke-width="16"/>
    <line x1="185" y1="0" x2="180" y2="512" stroke="#1e4a2c" stroke-width="36"/>
    <line x1="290" y1="0" x2="288" y2="512" stroke="#1e4a2c" stroke-width="16"/>
