  <!-- Anchor -->
  <g transform="translate(256,238)">
    <circle cx="0" cy="-78" r="44" fill="none" stroke="#7ecf9e" stroke-width="12"/>
    <line x1="0" y1="-34" x2="0" y2="102" stroke="#7ecf9e" stroke-width="12" stroke-linecap="round"/>
    <line x1="-74" y1="12" x2="74" y2="12" stroke="#7ecf9e" stroke-width="12" stroke-linecap="round"/>
    <path d="M0 102 Q-78 102 -83 56" fill="none" stroke="#7ecf9e" stroke-width="12" stroke-linecap="round"/>
